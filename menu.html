{"sec": "ZUPPE | СУПЫ", "icon": "🦞", "bg": "#FFF8E1", "col": "#F57F17", "name": "Рыбный суп с морепродуктами", "name_en": "Mediterranean Seafood Soup", "comp": "Морепродукты, оливковое масло, томаты, зелёный лук, зелень, белое вино", "weight": "340 гр", "price": 1300, "story": "Каждый рыбацкий порт Средиземноморья имеет свою версию рыбного супа: буйабес в Марселе, качукко в Ливорно, бродетто в Анконе. Суть одна — всё что выловили сегодня идёт в кастрюлю с томатами и белым вином. Блюдо живёт в моменте.", "tip": "Самый дорогой суп — и самый сытный. Хорош как основное блюдо для любителей морепродуктов."},
{"sec": "ZUPPE | СУПЫ", "icon": "🥦", "bg": "#FFF8E1", "col": "#F57F17", "name": "Черверлатто со страчателлой и горгонзолой", "name_en": "Cream of Broccoli Soup with Stracciatella & Gorgonzola", "comp": "Крем-суп брокколи, страчателла, горгонзола", "weight": "350 гр", "price": 950, "story": "Брокколи — самый недооценённый овощ итальянской кухни. В Калабрии его едят с пастой, в Сицилии — с анчоусами. Здесь — в виде бархатного крема, который венчает страчателла (нежность) и горгонзола (характер). Контраст температур и вкусов.", "tip": "Для вегетарианцев — отличный вариант. Горгонзола добавляет пикантность — предупреди гостей если они не любят острое."},
{"sec": "PASTIFICIO | МАНУФАКТУРА ПАСТЫ", "icon": "🍝", "bg": "#FAEEDA", "col": "#633806", "name": "Спагетти карбонара", "name_en": "Spaghetti alla Carbonara", "comp": "Паста, бекон, яйцо, пармезан, чёрный перец", "weight": "310 гр", "price": 950, "story": "Карбонара — одно из самых спорных блюд Италии. Настоящая карбонара делается без сливок — только яйцо, гуанчале (щёчный бекон), пекорино и чёрный перец. Сливки — это нарушение правил. Соус образуется от тепла пасты, которая буквально 'готовит' яйцо. Магия химии на тарелке.", "tip": "Если гость спросит 'а там есть сливки?' — объясни гордо: настоящая карбонара без сливок. Это плюс, а не минус."},
{"sec": "PASTIFICIO | МАНУФАКТУРА ПАСТЫ", "icon": "🍝", "bg": "#FAEEDA", "col": "#633806", "name": "Лингвини болоньезе", "name_en": "Linguine Bolognese", "comp": "Паста, соус болоньезе, пармезан", "weight": "340 гр", "price": 980, "story": "Болоньезе из Болоньи — официально зарегистрированный рецепт существует с 1982 года и хранится в Торговой палате. Настоящий рагу болоньезе готовится минимум 4 часа, включает говядину, свинину, морковь, сельдерей, белое вино и молоко. Никаких томатов в избытке. Никакой спешки.", "tip": "Один из самых узнаваемых соусов в мире. Комфортная еда — заказывают когда хотят 'чего-то домашнего'."},
{"sec": "PASTIFICIO | МАНУФАКТУРА ПАСТЫ", "icon": "🐟", "bg": "#FAEEDA", "col": "#633806", "name": "Фузилли с лососем и шпинатом", "name_en": "Fusilli with Salmon & Spinach", "comp": "Паста, филе лосося, шпинат, пармезан, томаты черри", "weight": "350 гр", "price": 1300, "story": "Спираль фузилли — не просто форма, а инженерное решение. Её закрученная поверхность удерживает соус в два раза лучше, чем гладкая паста. Лосось и шпинат — это омега-3 и железо в одной тарелке. Вкусно и полезно — редкое совпадение.", "tip": "Популярна у гостей, следящих за питанием. Лосось + шпинат — это 'ресторанно-здоровая' еда."},
{"sec": "PASTIFICIO | МАНУФАКТУРА ПАСТЫ", "icon": "🦐", "bg": "#FAEEDA", "col": "#633806", "name": "Лингвини с креветкой и кабачком", "name_en": "Linguine with King Prawns, Zucchini & Lemon Zest", "comp": "Паста, креветки, кабачок, сок лимона, цедра лимона, базилик", "weight": "360 гр", "price": 1400, "story": "Лингвини — плоская паста, чуть шире спагетти. Идеальна с морепродуктами: её плоская поверхность цепляет соус на основе масла, а не томата. Цедра лимона здесь — не украшение, а ключевой ингредиент: даёт аромат без кислоты сока.", "tip": "Лёгкое летнее блюдо. Для гостей которые хотят морепродукты, но без тяжёлого сливочного соуса."},
{"sec": "PASTIFICIO | МАНУФАКТУРА ПАСТЫ", "icon": "🦐", "bg": "#FAEEDA", "col": "#633806", "name": "Казаречче с креветкой, песто и страчателлой", "name_en": "Casarecce with Prawns, Pesto & Stracciatella", "comp": "Паста, креветки, соус песто, сливки, страчателла, фисташки", "weight": "360 гр", "price": 1500, "story": "Казаречче — сицилийская паста с двойным скручиванием. Форма создана специально для густых соусов — внутри паста полая и ловит соус. Песто из базилика + сливки + страчателла — это зелёное золото на тарелке. Фисташки сверху — сицилийская подпись.", "tip": "Одна из самых красивых паст в меню. Зелёный цвет песто + белая страчателла — выглядит эффектно."},
{"sec": "PASTIFICIO | МАНУФАКТУРА ПАСТЫ", "icon": "🍄", "bg": "#FAEEDA", "col": "#633806", "name": "Фузилли с щёчками и грибами", "name_en": "Fusilli with Beef Cheeks & Wild Mushrooms", "comp": "Паста, говяжьи щёчки, грибы, пармезан", "weight": "370 гр", "price": 1400, "story": "Говяжьи щёчки — это трудолюбивая мышца, которая весь день жуёт. Именно поэтому она невероятно богата коллагеном и при долгом томлении становится шелковистой. Соус получается густым, мясным, почти тёмным. Грибы добавляют земляную глубину. Это паста для тёплых вечеров.", "tip": "Самая сытная паста в меню. Для гостей, которые 'хотят чего-то мясного'."},
{"sec": "RISOTTO | РИЗОТТО", "icon": "🍚", "bg": "#FAEEDA", "col": "#633806", "name": "Ризотто с лесными грибами", "name_en": "Wild Mushroom Risotto", "comp": "Рис Арборио, лук шалот, сливочное масло, пармезан, белое вино, лесные грибы", "weight": "420 гр", "price": 1290, "story": "Ризотто нельзя торопить. Минимум 18 минут непрерывного помешивания — таково правило. Рис Арборио выпускает крахмал постепенно, создавая кремовую консистенцию без единой капли сливок. Лесные грибы дают тот самый лесной, дождливый аромат, который невозможно сымитировать.", "tip": "Если гость спрашивает 'почему так долго' — объясни про технику. Ризотто нельзя приготовить за 5 минут. Ожидание — часть удовольствия."},
{"sec": "RISOTTO | РИЗОТТО", "icon": "🦐", "bg": "#FAEEDA", "col": "#633806", "name": "Ризотто с креветками", "name_en": "King Prawn Risotto", "comp": "Рис Арборио, лук шалот, сливочное масло, пармезан, белое вино, королевские креветки", "weight": "420 гр", "price": 1400, "story": "Морское ризотто в Венеции подают в трattorie прямо у причала — с видом на каналы. Бульон здесь должен быть на панцирях от креветок — так получается морская глубина вкуса. Финальный мазок сливочного масла ('mantecatura') делает ризотто блестящим и нежным.", "tip": "Рекомендуй к бокалу Пино Гриджо или Соаве. Классическое итальянское сочетание."},
{"sec": "RISOTTO | РИЗОТТО", "icon": "🍅", "bg": "#FAEEDA", "col": "#633806", "name": "Ризотто арабьята со страчателлой", "name_en": "Arrabbiata Risotto with Stracciatella", "comp": "Рис, соус из томатов, страчателла, сливочное масло, пармезан", "weight": "390 гр", "price": 990, "story": "Арабьята — означает 'злой' по-итальянски. Острый томатный соус на основе перца чили был придуман как еда для бедняков Рима. В сочетании с нежной страчателлой характер соуса укрощается — острое встречает молочное, и они находят компромисс.", "tip": "Для любителей острого. Страчателла охлаждает остроту — блюдо не обжигает, а играет."},
{"sec": "PIZZA | ПИЦЦА", "icon": "🍕", "bg": "#FCE4EC", "col": "#880E4F", "name": "Пицца Маргарита с моцареллой и базиликом", "name_en": "Classic Margherita Pizza", "comp": "Тесто, томатный соус, моцарелла, базилик", "weight": "390 гр", "price": 1100, "story": "В 1889 году пиццайоло Раффаэле Эспозито испёк пиццу для королевы Маргариты Савойской. Он выбрал цвета итальянского флага: красный томат, белая моцарелла, зелёный базилик. Королева пришла в восторг. Пицца получила её имя. С тех пор — 135 лет успеха.", "tip": "Самая простая — и самая честная. Если тесто и томат хорошие, Маргарита покажет это лучше любой другой пиццы."},
{"sec": "PIZZA | ПИЦЦА", "icon": "🧀", "bg": "#FCE4EC", "col": "#880E4F", "name": "Пицца Четыре сыра с грушей и руколой", "name_en": "Four Cheese Pizza with Pear & Arugula", "comp": "Тесто, томатный соус, моцарелла, горгонзола, страчателла, пармезан, груша, руккола", "weight": "480 гр", "price": 1500, "story": "Четыре характера на одном тесте. Моцарелла плавится. Страчателла вытекает. Горгонзола дерзит. Пармезан солит. Груша добавляет сладость, руккола — горечь. Это не пицца — это дегустация в одном блюде.", "tip": "Для любителей сыра — это их пицца. Предупреди что горгонзола острая, если гость чувствителен к голубым сырам."},
{"sec": "PIZZA | ПИЦЦА", "icon": "🌶", "bg": "#FCE4EC", "col": "#880E4F", "name": "Пицца с пепперони и халапеньо", "name_en": "Pepperoni & Jalapeño Pizza", "comp": "Тесто, томатный соус, моцарелла, пепперони, перец халапеньо", "weight": "445 гр", "price": 1200, "story": "Пепперони — американская интерпретация итальянской колбасы. Слово pepperoni по-итальянски означает просто 'перец'. Американцы переделали его в острую колбасу и вернули обратно в Италию как хит. Добавление халапеньо делает пиццу честно острой.", "tip": "Обязательно предупреди гостей об остроте. Предложи бокал холодного пива или лимонад для нейтрализации."},
{"sec": "PIZZA | ПИЦЦА", "icon": "🦐", "bg": "#FCE4EC", "col": "#880E4F", "name": "Пицца с королевскими креветками", "name_en": "King Prawn Pizza", "comp": "Тесто, томатный соус, моцарелла, королевские креветки", "weight": "465 гр", "price": 1500, "story": "В Неаполе говорят: пицца с морепродуктами — это риск. Рыба и сыр вместе — итальянское табу. Но когда делаешь это правильно — это откровение. Наши королевские креветки запекаются прямо на пицце, поглощая жар камня.", "tip": "Необычный выбор — расскажи что это итальянское 'нарушение правил' которое работает."},
{"sec": "PIZZA | ПИЦЦА", "icon": "🍄", "bg": "#FCE4EC", "col": "#880E4F", "name": "Пицца с грибами и ветчиной", "name_en": "Mushroom & Ham Pizza", "comp": "Тесто, томатный соус, моцарелла, шампиньоны, ветчина", "weight": "495 гр", "price": 1300, "story": "Prosciutto e funghi — самая популярная пицца в итальянских семейных ресторанах после Маргариты. Классика без претензий: грибы дают землистость, ветчина — солёность, моцарелла — нежность. Баланс без лишних слов.", "tip": "Хороший выбор для тех, кто не может определиться. Нравится всем, никого не удивляет."},
{"sec": "PIZZA | ПИЦЦА", "icon": "🥩", "bg": "#FCE4EC", "col": "#880E4F", "name": "Пицца с пармской ветчиной, руколой и пармезаном", "name_en": "Prosciutto di Parma, Arugula & Parmesan Pizza", "comp": "Тесто, томатный соус, моцарелла, пармская ветчина, пармезан, руккола", "weight": "480 гр", "price": 1500, "story": "Пармская ветчина кладётся на пиццу ПОСЛЕ выпечки — это принципиально. Жар уничтожил бы её нежность. Холодная ветчина + горячая пицца + свежая руккола + хлопья пармезана — четыре температуры и текстуры в одном укусе.", "tip": "Объясни гостям почему ветчина кладётся последней — это знание превращает еду в историю."},
{"sec": "SECONDI | ОСНОВНЫЕ БЛЮДА", "icon": "🥩", "bg": "#EDE7F6", "col": "#4527A0", "name": "Котлета из индейки с картофельным пюре", "name_en": "Turkey Cutlet with Truffle Mashed Potato", "comp": "Индейка, лук, сливочное масло, хлеб, картофельное пюре, сливки", "weight": "300 гр", "price": 1400, "story": "Котлета — это русско-советская интерпретация французской côtelette. Индейка вместо курицы даёт более нежное и диетическое мясо. Сливочное пюре — комфортная еда в чистом виде. Блюдо для тех, кто приходит в ресторан не экспериментировать, а отдыхать.", "tip": "Универсальный выбор: подойдёт детям, пожилым гостям, тем кто 'не знает что взять'."},
{"sec": "SECONDI | ОСНОВНЫЕ БЛЮДА", "icon": "🥩", "bg": "#EDE7F6", "col": "#4527A0", "name": "Говяжьи щёки с орзо", "name_en": "Braised Beef Cheeks with Orzo Pasta", "comp": "Томлёные говяжьи щёки, копчёные томаты, паста орзо, сливочный соус", "weight": "320 гр", "price": 2200, "story": "Щёки — это мышца, которая работает всю жизнь животного. Именно поэтому в ней столько коллагена. 8 часов томления при низкой температуре — и жёсткое мясо становится нежным как масло. Паста орзо (в форме ячменных зёрен) вбирает все соки. Блюдо требует терпения и отдаёт сторицей.", "tip": "Одно из самых трудоёмких блюд в меню. Объясни гостям технику приготовления — это повышает воспринимаемую ценность."},
{"sec": "SECONDI | ОСНОВНЫЕ БЛЮДА", "icon": "🐟", "bg": "#EDE7F6", "col": "#4527A0", "name": "Стейк лосося с кабачком", "name_en": "Atlantic Salmon Steak with Zucchini & Beurre Blanc", "comp": "Стейк лосося, кабачок, цедра лайма, шпинат, соус берблан на основе белого вина", "weight": "280 гр", "price": 1900, "story": "Берблан (beurre blanc) — классический французский соус: масло, белое вино, лук шалот. Эмульсия, которая требует точности температуры. Слишком горячо — расслоится. Именно поэтому его делают в последний момент. Лосось + берблан — это Бретань на тарелке.", "tip": "Для гостей, следящих за весом, но не готовых жертвовать удовольствием. Рыба вместо мяса — без потери вкуса."},
{"sec": "SECONDI | ОСНОВНЫЕ БЛЮДА", "icon": "🥩", "bg": "#EDE7F6", "col": "#4527A0", "name": "Стейк стриплойн с картофелем, руколой и перечным соусом", "name_en": "Striploin Steak with Roasted Potato & Pepper Sauce", "comp": "Стейк стриплойн, перечный соус, руккола, картофель по-деревенски", "weight": "370 гр", "price": 2900, "story": "Стриплойн — поясничная часть, 'нью-йоркский стрип'. Мышца почти не двигается — поэтому мясо нежное, но с выраженным говяжьим вкусом. Перечный соус (sauce au poivre) — французская классика: коньяк, сливки, дроблёный перец. Этот стейк заказывают когда хотят произвести впечатление.", "tip": "Самое дорогое блюдо в меню. Уточни прожарку: medium rare — идеально для стриплойна. Объясни почему."},
{"sec": "SECONDI | ОСНОВНЫЕ БЛЮДА", "icon": "🐟", "bg": "#EDE7F6", "col": "#4527A0", "name": "Дорадо с томатной сальсой", "name_en": "Grilled Sea Bream with Fresh Tomato Salsa", "comp": "Дорадо целиком или филе, томатная сальса, зелень", "weight": "400 гр", "price": 2100, "story": "Дорадо — аристократ среди рыб. В Древнем Риме её разводили в специальных прудах виллы — это была рыба для богатых. Нежное белое мясо с еле уловимым сладким послевкусием. Томатная сальса — это юг Италии: свежие томаты, оливки, каперсы, базилик. Минимум термообработки, максимум вкуса.", "tip": "Для гостей, которые 'хотят рыбу, но не хотят лосося'. Дорадо — лёгкая, нежная, благородная."},

const SECS=[...new Set(D.map(d=>d.sec))];
let filter='all',search='';
const fb=document.getElementById('filters');
const allBtn=document.createElement('button');
allBtn.className='fb on';allBtn.textContent='Все блюда';allBtn.dataset.f='all';
fb.appendChild(allBtn);
SECS.forEach(sec=>{
  const b=document.createElement('button');
  b.className='fb';
  const label=sec.split('|')[0].trim();
  const isLemon=sec==='BEVANDE | НАПИТКИ';
  b.textContent=isLemon?'🍋 '+label:label;
  b.dataset.f=sec;
  fb.appendChild(b);
});
fb.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    fb.querySelectorAll('.fb').forEach(x=>{x.classList.remove('on');x.classList.remove('lemon-on');});
    b.classList.add(b.dataset.f==='BEVANDE | НАПИТКИ'?'lemon-on':'on');
    filter=b.dataset.f;render();
  });
});
document.getElementById('search').addEventListener('input',e=>{search=e.target.value;render();});
function render(){
  const list=document.getElementById('list');
  const q=search.toLowerCase();
  const filtered=D.filter(d=>{
    const mf=filter==='all'||d.sec===filter;
    const ms=!q||d.name.toLowerCase().includes(q)||d.comp.toLowerCase().includes(q)||(d.story&&d.story.toLowerCase().includes(q));
    return mf&&ms;
  });
  if(!filtered.length){list.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  let html='',prev='';
  filtered.forEach((d,i)=>{
    if(filter==='all'&&d.sec!==prev){
      prev=d.sec;
      html+=`<div class="sec-lbl">${d.icon} ${d.sec}</div>`;
    }
    const isNew=d.sec==='BEVANDE | НАПИТКИ';
    html+=`<div class="card" id="c${i}">
      <div class="ch" onclick="tog(${i})">
        <div class="badge" style="background:${d.bg}">${d.icon}</div>
        <div class="cm">
          <div class="cn">${d.name}${isNew?'<span class="new-badge">NEW 2026</span>':''}</div>
          <div class="cen">${d.name_en}</div>
        </div>
        <div class="cp">${d.price} ₸</div>
        <span class="chev">▾</span>
      </div>
      <div class="cb">
        ${d.story?`<div class="story-box"><div class="story-title">📖 ${isNew?'История напитка':'История блюда'}</div>${d.story}</div>`:''}
        ${d.comp?`<div class="comp-box"><div class="comp-lbl">Состав</div>${d.comp}</div>`:''}
        ${d.tip?`<div class="tip-box"><div class="tip-lbl">💡 Совет официанту</div>${d.tip}</div>`:''}
        <div class="info-row">
          ${d.weight?`<span class="info-pill">⚖️ ${d.weight}</span>`:''}
          <span class="info-pill">💰 ${d.price} ₸</span>
        </div>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}
function tog(i){document.getElementById('c'+i).classList.toggle('open');}
render();
</script>

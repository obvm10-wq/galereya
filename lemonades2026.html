<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лимонады 2026 — Галерея Вкусов</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAF6F0;color:#333;min-height:100vh}
.nav-bar{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #EDE0D4}
.nav-btn{padding:8px 14px;font-size:12px;font-weight:500;border:1px solid #EDE0D4;border-radius:10px;background:#fff;color:#888;cursor:pointer;text-align:center;text-decoration:none;display:inline-block;transition:all .15s}
.nav-btn:hover{background:#F5EDE8;border-color:#B8860B;color:#7A2A2A}
.nav-btn.cur{background:#2E7D32;border-color:#2E7D32;color:#fff;pointer-events:none}
.hero{background:linear-gradient(135deg,#1B5E20,#2E7D32,#388E3C);padding:48px 20px;text-align:center;color:#fff}
.hero-badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:5px 16px;font-size:12px;font-weight:500;margin-bottom:16px}
.hero h1{font-size:28px;font-weight:700;margin-bottom:10px}
.hero p{font-size:14px;opacity:.85;line-height:1.6;max-width:400px;margin:0 auto 20px}
.hero-tags{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.hero-tag{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 14px;font-size:12px}
.content{max-width:900px;margin:0 auto;padding:20px 16px}
.search-bar{position:relative;margin-bottom:14px}
.search-bar input{width:100%;padding:10px 16px 10px 40px;font-size:14px;border:1px solid #C8E6C9;border-radius:10px;background:#fff;color:#333}
.si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;color:#aaa}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-lbl{font-size:12px;color:#888;font-weight:500}
.fb{padding:6px 14px;font-size:12px;border:1px solid #C8E6C9;border-radius:20px;background:#fff;color:#666;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.fb:hover{background:#F1F8E9}
.fb.on{background:#2E7D32;border-color:#2E7D32;color:#fff}
.fb .cnt{background:rgba(255,255,255,.3);border-radius:10px;padding:1px 6px;font-size:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#fff;border:1px solid #E8F5E9;border-radius:14px;overflow:hidden;transition:box-shadow .2s,border-color .2s}
.card:hover{box-shadow:0 4px 16px rgba(46,125,50,.12);border-color:#81C784}
.card-header{padding:20px 20px 14px}
.card-emoji{font-size:36px;margin-bottom:12px;display:block}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ctag{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:500}
.t-fruit{background:#FFF8E1;color:#F57F17}
.t-berry{background:#FCE4EC;color:#C62828}
.t-herb{background:#E8F5E9;color:#2E7D32}
.t-spice{background:#FBE9E7;color:#BF360C}
.t-dessert{background:#F3E5F5;color:#6A1B9A}
.t-apert{background:#E3F2FD;color:#1565C0}
.card-name{font-size:17px;font-weight:700;color:#1B5E20;margin-bottom:6px;line-height:1.3}
.card-desc{font-size:12px;color:#666;line-height:1.65;margin-bottom:14px}
.card-details{border-top:1px solid #E8F5E9}
.details-toggle{width:100%;padding:10px 20px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:500;color:#2E7D32}
.details-toggle .chev{transition:transform .2s;font-size:11px}
.card.open .details-toggle .chev{transform:rotate(180deg)}
.details-body{display:none;padding:0 20px 16px}
.card.open .details-body{display:block}
.detail-block{margin-bottom:12px}
.detail-lbl{font-size:10px;font-weight:600;color:#2E7D32;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.detail-text{font-size:12px;color:#555;line-height:1.65}
.story-box{background:#F1F8E9;border-left:3px solid #4CAF50;border-radius:6px;padding:9px 11px;font-size:12px;color:#555;line-height:1.65}
.tip-box{background:#FFF8E1;border-left:3px solid #FBC02D;border-radius:6px;padding:9px 11px;font-size:12px;color:#666;line-height:1.6}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#F1F8E9;border-top:1px solid #E8F5E9}
.price-tag{font-size:18px;font-weight:700;color:#2E7D32}
.vol-tag{font-size:12px;color:#888}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:14px}
</style>
</head>
<body>

<div class="nav-bar">
  <a class="nav-btn" href="index.html">🎮 Игра</a>
  <a class="nav-btn" href="menu.html">🍽 Меню</a>
  <a class="nav-btn" href="wine_list_stories.html">🍷 Вина</a>
  <a class="nav-btn" href="drinks.html">🍹 Коктейли</a>
  <a class="nav-btn cur" href="lemonades2026.html">🍋 Лимонады</a>
</div>

<div class="hero">
  <div class="hero-badge">🍋 Лето 2026 · Новинка</div>
  <h1>Авторские лимонады</h1>
  <p>Линейка безалкогольных напитков ручного приготовления. Метод билд, бокал хайбол, лёд, лист бамбука.</p>
  <div class="hero-tags">
    <span class="hero-tag">🍹 5 авторских рецептов</span>
    <span class="hero-tag">💧 Метод Билд</span>
    <span class="hero-tag">🎋 Лист бамбука</span>
  </div>
</div>

<div class="content">
  <div class="search-bar">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="Поиск по названию или вкусу...">
  </div>
  <div class="filter-row">
    <span class="filter-lbl">Фильтр:</span>
    <button class="fb on" data-f="all"><span>Все</span><span class="cnt" id="cnt-all">5</span></button>
    <button class="fb" data-f="fruit">🍊 Фрукты</button>
    <button class="fb" data-f="berry">🍓 Ягоды</button>
    <button class="fb" data-f="herb">🌿 Травы</button>
    <button class="fb" data-f="apert">🍸 Аперитив</button>
    <button class="fb" data-f="dessert">🍮 К десерту</button>
  </div>
  <div class="cards" id="cards"></div>
</div>

<script>
const L=[
  {
    name:"Маракуйя — Корица",emoji:"🌴",
    tags:[{cls:"t-fruit",label:"Тропик"},{cls:"t-spice",label:"Пряный"}],
    filters:["fruit","apert"],
    desc:"Яркий, экзотический вкус. Интенсивная кислинка спелой маракуйи, сбалансированная пряными нотами натуральной корицы. Приятное пряное послевкусие.",
    comp:"Маракуйя, корица, лимонный сок, сахарный сироп, минеральная вода",
    method:"Билд. В хайбол со льдом добавить все ингредиенты, аккуратно перемешать. Украсить листом бамбука.",
    story:"Маракуйя — плод лианы, которая цветёт только 24 часа. Испанские миссионеры в Южной Америке в XVII веке увидели в цветке символы Страстей Христовых и назвали его passion fruit. Корица добавляет тепло и пряность — самый экзотический лимонад в коллекции.",
    tip:"Для гостей-авантюристов и любителей тропического. Хорошо к закускам — кислинка маракуйи возбуждает аппетит.",
    price:"390 ₸", vol:"300 мл"
  },
  {
    name:"Малина — Лемонграсс",emoji:"🍓",
    tags:[{cls:"t-berry",label:"Ягодный"},{cls:"t-herb",label:"Травяной"}],
    filters:["berry","herb"],
    desc:"Нежный ягодный лимонад с выразительным цитрусово-травянистым оттенком. Свежесть лемонграсса с нотками лимонной цедры. Кристально чистый вкус.",
    comp:"Малина, лемонграсс, лимонный сок, сахарный сироп, минеральная вода",
    method:"Билд. В хайбол со льдом добавить все ингредиенты, аккуратно перемешать. Украсить листом бамбука.",
    story:"Лемонграсс — тропическая трава с ароматом лимона и имбиря. В тайской кухне без неё не обходится ни один суп. Здесь она встречается с малиной — получается лимонад с азиатским характером. Один из самых необычных в коллекции.",
    tip:"Рекомендуй гостям, которые хотят что-то необычное вместо классической газировки. Красивый ярко-розовый цвет.",
    price:"390 ₸", vol:"300 мл"
  },
  {
    name:"Вишня — Ореховая трава",emoji:"🍒",
    tags:[{cls:"t-berry",label:"Ягодный"},{cls:"t-dessert",label:"Гастрономический"}],
    filters:["berry","dessert"],
    desc:"Глубокий, благородный вкус. Насыщенная вишня с бархатистой кислинкой, раскрывающейся нотами пажитника и грецкого ореха. Изысканный шлейф.",
    comp:"Вишня, ореховая трава (оржад), лимонный сок, сахарный сироп, минеральная вода",
    method:"Билд. В хайбол со льдом добавить все ингредиенты, аккуратно перемешать. Украсить листом бамбука.",
    story:"Оржад (orgeat) — миндальный сироп с цветочной водой. Используется в коктейле Май Тай и десятках классических рецептов. Вишня с оржадом — это юг Франции в бокале: провансальская вишня и миндальный аромат. Самый взрослый из лимонадов.",
    tip:"Рекомендуй к десертам — идеально к брауни с пармезаном и сабайону. Миндаль оржада перекликается с ореховыми нотами шоколада.",
    price:"390 ₸", vol:"300 мл"
  },
  {
    name:"Черника — Ваниль",emoji:"🫐",
    tags:[{cls:"t-berry",label:"Ягодный"},{cls:"t-dessert",label:"К десерту"}],
    filters:["berry","dessert"],
    desc:"Мягкий, обволакивающий, десертный. Лесная черника с изысканными нотами натуральной стручковой ванили. Напоминает итальянский премиальный сорбет.",
    comp:"Черника, ваниль, лимонный сок, сахарный сироп, минеральная вода",
    method:"Билд. В хайбол со льдом добавить все ингредиенты, аккуратно перемешать. Украсить листом бамбука.",
    story:"Ваниль — вторая по популярности специя в мире после чёрного перца. Родина — Мексика, где её использовали ацтеки задолго до европейцев. Черника + ваниль: ягода даёт кислинку, ваниль — сладкую теплоту. Лимонад с десертным характером.",
    tip:"Нравится детям и тем, кто любит сладкое. Красивый тёмно-фиолетовый цвет. Хорошо к семифредо эскимо.",
    price:"390 ₸", vol:"300 мл"
  },
  {
    name:"Базилик — Огурец",emoji:"🌿",
    tags:[{cls:"t-herb",label:"Травяной"},{cls:"t-apert",label:"Аперитив"}],
    filters:["herb","apert"],
    desc:"Освежающий, лёгкий, травянистый. Свежий огурец с выразительными нотами итальянского базилика. Идеальный аперитив для жаркого дня.",
    comp:"Свежий огурец, базилик, лимонный сок, сахарный сироп, минеральная вода",
    method:"Билд. В хайбол со льдом добавить все ингредиенты, аккуратно перемешать. Украсить листом бамбука.",
    story:"Огурец в напитке — британское изобретение. В Лондоне его добавляют в джин-тоник с XIX века — охлаждает и освежает. Базилик добавляет итальянский акцент. Самый несладкий и самый летний лимонад в коллекции.",
    tip:"Идеально в жару. Для гостей, которые не любят сладкое — самый деликатный вариант. Хорошо как аперитив перед едой.",
    price:"390 ₸", vol:"300 мл"
  },
];

let filter='all', search='';

document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    filter=b.dataset.f;
    render();
  });
});
document.getElementById('search').addEventListener('input',e=>{
  search=e.target.value;render();
});

function render(){
  const cards=document.getElementById('cards');
  const q=search.toLowerCase();
  const filtered=L.filter(l=>{
    const mf=filter==='all'||l.filters.includes(filter);
    const ms=!q||l.name.toLowerCase().includes(q)||l.desc.toLowerCase().includes(q)||l.comp.toLowerCase().includes(q);
    return mf&&ms;
  });
  document.getElementById('cnt-all').textContent=L.length;
  if(!filtered.length){cards.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  cards.innerHTML=filtered.map((l,i)=>`
    <div class="card" id="lc${i}">
      <div class="card-header">
        <span class="card-emoji">${l.emoji}</span>
        <div class="card-tags">${l.tags.map(t=>`<span class="ctag ${t.cls}">${t.label}</span>`).join('')}</div>
        <div class="card-name">${l.name}</div>
        <div class="card-desc">${l.desc}</div>
      </div>
      <div class="price-row">
        <span class="price-tag">${l.price}</span>
        <span class="vol-tag">${l.vol}</span>
      </div>
      <div class="card-details">
        <button class="details-toggle" onclick="tog(${i})">
          Состав и подача <span class="chev">▾</span>
        </button>
        <div class="details-body">
          <div class="detail-block">
            <div class="detail-lbl">Состав</div>
            <div class="detail-text">${l.comp}</div>
          </div>
          <div class="detail-block">
            <div class="detail-lbl">Приготовление</div>
            <div class="detail-text">${l.method}</div>
          </div>
          <div class="detail-block">
            <div class="story-box"><b>📖 История</b><br>${l.story}</div>
          </div>
          <div class="detail-block" style="margin-bottom:0">
            <div class="tip-box"><b>💡 Совет официанту</b><br>${l.tip}</div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function tog(i){document.getElementById('lc'+i).classList.toggle('open');}
render();
</script>
</body>
</html>

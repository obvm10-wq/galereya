.card-name{font-size:14px;font-weight:600;color:#1B5E20;line-height:1.3}
.card-base{font-size:11px;color:#999;margin-top:2px}
.card-vol{font-size:12px;font-weight:500;color:#888;flex-shrink:0;margin-right:8px;white-space:nowrap}

.card.open .chev{transform:rotate(180deg)}

.ing-table tr.total-row td{font-weight:600;color:#1B5E20;background:#F1F8E9;font-size:12px}

.tip-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#E8F5E9;color:#2E7D32;font-weight:600;margin-bottom:8px}
.empty{text-align:center;padding:3rem;color:#bbb;font-size:14px}

const BASE_LABEL={rum:"Ром",vodka:"Водка",tequila:"Текила",whisky:"Виски",gin:"Джин",other:"Другое"};
let filter="all", search="";

function render(){
  const list=document.getElementById("list");
  const q=search.toLowerCase();
  const filtered=C.filter(c=>{
    const mf=filter==="all"||c.base===filter;
    const ms=!q||c.name.toLowerCase().includes(q)||c.ingredients.some(i=>i.name.toLowerCase().includes(q))||c.story.toLowerCase().includes(q);
    return mf&&ms;
  });
  if(!filtered.length){list.innerHTML='<div class="empty">Ничего не найдено</div>';return;}
  list.innerHTML=filtered.map((c,i)=>`
    <div class="card" id="cc${i}">
      <div class="card-header" onclick="tog(${i})">
        <div class="badge">${c.emoji}</div>
        <div class="card-meta">
          <div class="card-name">${c.name}</div>
          <div class="card-base">${BASE_LABEL[c.base]} · ${c.glass}</div>
        </div>
        <div class="card-vol">${c.volume}</div>
        <span class="chev">▾</span>
      </div>
      <div class="card-body">
        <span class="tip-tag">${BASE_LABEL[c.base]}</span>
        <div class="story-box">
          <div class="story-title">📖 ${c.storyTitle}</div>
          ${c.story}
        </div>
        <div class="section-title">Состав</div>
        <table class="ing-table">
          <tr><th>Ингредиент</th><th>Кол-во</th></tr>
          ${c.ingredients.map(i=>`<tr><td>${i.name}</td><td>${i.amount}</td></tr>`).join("")}
          <tr class="total-row"><td>Выход</td><td>${c.volume}</td></tr>
        </table>
        <div class="section-title">Приготовление</div>
        <div class="prep-box">🍸 ${c.prep}</div>
        <div class="section-title">Гарниш и подача</div>
        <div class="garnish-box"><span class="garnish-lbl">🌿 Гарниш</span>${c.garnish}</div>
      </div>
    </div>`).join("");
}

function tog(i){document.getElementById("cc"+i).classList.toggle("open")}

document.querySelectorAll(".filter-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    filter=b.dataset.f;
    render();
  });
});

document.getElementById("search").addEventListener("input",e=>{
  search=e.target.value;
  render();
});

render();
</script>
